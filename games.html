<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HDDev Arcade - Five Classic Mini Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0f1725, #070b14);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 20px;
        }

        /* main hub container */
        .game-hub {
            max-width: 1300px;
            width: 100%;
            background: rgba(22, 28, 46, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 56px;
            padding: 24px 28px 32px 28px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 220, 0.15);
            transition: all 0.2s;
        }

        /* header */
        .arcade-title {
            text-align: center;
            margin-bottom: 28px;
        }
        .arcade-title h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #e0c878, #c9a53b, #e09d32);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            font-weight: 700;
        }
        .arcade-title p {
            color: #a9b9e0;
            font-weight: 500;
            margin-top: 8px;
            font-size: 0.95rem;
        }

        /* game selection menu */
        .game-menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-bottom: 35px;
            background: rgba(0, 0, 0, 0.4);
            padding: 18px 16px;
            border-radius: 70px;
            backdrop-filter: blur(4px);
        }
        .game-btn {
            background: linear-gradient(145deg, #2c314f, #1b1f38);
            border: none;
            padding: 12px 24px;
            border-radius: 48px;
            font-size: 1rem;
            font-weight: bold;
            color: #f7e9c3;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 0 #0a0d18;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }
        .game-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(145deg, #3f4570, #262c4f);
            box-shadow: 0 7px 0 #0a0d18;
        }
        .game-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0a0d18;
        }
        .active-game {
            background: linear-gradient(145deg, #d4a13e, #b47c2e);
            color: #1a1e2c;
            box-shadow: 0 0 12px rgba(212, 161, 62, 0.6);
            border: 1px solid #ffdd99;
        }

        /* game display panel */
        .game-panel {
            background: #1f253ecc;
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 20px 24px 28px;
            margin-bottom: 30px;
            transition: all 0.25s;
            border: 1px solid rgba(255, 215, 130, 0.3);
            min-height: 480px;
        }
        .game-title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffdfa5;
            letter-spacing: 1px;
            border-bottom: 2px dashed #ffcd7e66;
            display: inline-block;
            width: auto;
            padding-bottom: 6px;
        }
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        /* shared score styles */
        .score-info {
            background: #0d1224cc;
            border-radius: 60px;
            padding: 10px 24px;
            display: flex;
            gap: 40px;
            font-weight: bold;
            backdrop-filter: blur(4px);
            margin-bottom: 20px;
        }
        .score-info span {
            color: #ffda88;
            font-size: 1.8rem;
            font-weight: 800;
            margin-left: 12px;
        }

        /* reaction game (click target) */
        .reaction-arena {
            position: relative;
            width: 100%;
            min-height: 320px;
            background: #131a2e;
            border-radius: 48px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: inset 0 0 12px #00000055, 0 8px 18px black;
        }
        .moving-target {
            position: absolute;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #f5b042, #d97a1c);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.08s linear;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #2d210c;
            font-size: 1.8rem;
        }
        .moving-target:active {
            transform: scale(0.94);
        }

        /* memory pattern game (simon style) */
        .pattern-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .pattern-btn {
            width: 110px;
            height: 110px;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 3px solid #ffe0a3;
            opacity: 0.85;
        }
        .pattern-btn:active {
            transform: scale(0.96);
        }
        .pattern-active {
            filter: brightness(1.3);
            box-shadow: 0 0 18px white;
            transform: scale(1.02);
        }
        .mem-message {
            font-weight: bold;
            background: #060b1a;
            padding: 8px 20px;
            border-radius: 60px;
            color: #ffcf7a;
        }

        /* timing game: stop the meter */
        .meter-box {
            background: #030617;
            border-radius: 40px;
            padding: 20px;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .meter-bar {
            width: 100%;
            height: 28px;
            background: #2a2f4b;
            border-radius: 30px;
            margin: 15px 0;
            overflow: hidden;
        }
        .meter-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffb347, #ff6b4a);
            transition: width 0.02s linear;
        }
        .stop-btn {
            background: #e09d32;
            border: none;
            font-size: 1.3rem;
            padding: 12px 32px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            margin: 12px;
            transition: 0.1s;
        }
        .stop-btn:active {
            transform: scale(0.96);
        }

        /* puzzle: tile swap (3x3) */
        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 300px;
            background: #151e32;
            padding: 16px;
            border-radius: 32px;
        }
        .tile {
            background: #ffc576;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.1s;
            color: #2d2412;
            box-shadow: 0 6px 0 #8b5a2b;
        }
        .tile:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8b5a2b;
        }
        .empty-tile {
            background: #4a5b85;
            box-shadow: inset 0 0 0 2px #ffe0a3;
            cursor: pointer;
        }

        /* catch game (falling objects) */
        .catch-arena {
            position: relative;
            width: 100%;
            height: 380px;
            background: #0f1629;
            border-radius: 48px;
            overflow: hidden;
            cursor: crosshair;
            border: 2px solid #ffcf7a66;
        }
        .catcher {
            position: absolute;
            bottom: 10px;
            left: 50%;
            width: 100px;
            height: 28px;
            background: #f0bc6e;
            border-radius: 40px;
            transform: translateX(-50%);
            pointer-events: none;
            box-shadow: 0 4px 8px black;
        }
        .fall-item {
            position: absolute;
            width: 42px;
            height: 42px;
            background: radial-gradient(circle, #ffbc6e, #cb7b2a);
            border-radius: 50%;
            cursor: pointer;
            top: 0px;
            transition: top 0.02s linear;
        }

        /* footer */
        .footer {
            text-align: center;
            padding: 18px 0 8px;
            color: #adbbdd;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            border-top: 1px solid #ffda8844;
            font-weight: 500;
        }

        button {
            font-family: inherit;
        }
        @media (max-width: 680px) {
            .game-menu { border-radius: 40px; gap: 10px; }
            .game-btn { padding: 8px 16px; font-size: 0.8rem;}
            .pattern-btn { width: 70px; height: 70px; }
            .puzzle-grid { width: 260px; gap: 8px; }
        }
    </style>
</head>
<body>
<div class="game-hub">
    <div class="arcade-title">
        <h1>HDDev Arcade</h1>
        <p>five classic games | click & play | no sound</p>
    </div>

    <div class="game-menu" id="gameMenu">
        <button class="game-btn" data-game="reaction"> reaction clicker</button>
        <button class="game-btn" data-game="memory"> memory pattern</button>
        <button class="game-btn" data-game="timing"> timing master</button>
        <button class="game-btn" data-game="puzzle"> tile swap</button>
        <button class="game-btn" data-game="catch"> catch drop</button>
    </div>

    <div class="game-panel" id="gamePanel">
        <!-- dynamic game content -->
    </div>

    <div class="footer">
        HDDev | All Rights Reserved 2026
    </div>
</div>

<script>
    // ---------- GAME STATE & UTILS ----------
    let currentGame = "reaction";
    let gameIntervals = [];

    function clearGameIntervals() {
        gameIntervals.forEach(interval => clearInterval(interval));
        gameIntervals = [];
    }

    // helper to stop any ongoing animation frame loops if needed
    let animationFrameId = null;
    function cancelAnimation() {
        if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
            animationFrameId = null;
        }
    }

    // ---------- REACTION GAME (click moving targets) ----------
    let reactionScore = 0;
    let reactionInterval = null;
    let targetActive = false;
    let currentTarget = null;
    let reactionArena = null;

    function buildReactionGame() {
        const container = document.createElement('div');
        container.className = 'game-area';
        container.innerHTML = `
            <div class="score-info">
                <div>Score: <span id="reactionScore">0</span></div>
                <div>⭐ click the moving star</div>
            </div>
            <div id="reactionArena" class="reaction-arena" style="height: 360px;"></div>
            <button id="resetReaction" class="game-btn" style="background:#3a2a1a;">reset game</button>
        `;
        const arena = container.querySelector('#reactionArena');
        reactionArena = arena;
        const scoreSpan = container.querySelector('#reactionScore');
        
        function updateScoreUI() { if(scoreSpan) scoreSpan.innerText = reactionScore; }
        
        function spawnTarget() {
            if(!reactionArena) return;
            if(currentTarget) currentTarget.remove();
            const rect = reactionArena.getBoundingClientRect();
            if(rect.width === 0) return;
            const maxX = Math.max(40, rect.width - 80);
            const maxY = Math.max(40, rect.height - 80);
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;
            const target = document.createElement('div');
            target.className = 'moving-target';
            target.innerText = '★';
            target.style.left = x + 'px';
            target.style.top = y + 'px';
            target.style.position = 'absolute';
            target.addEventListener('click', (e) => {
                e.stopPropagation();
                if(targetActive) {
                    reactionScore++;
                    updateScoreUI();
                    target.remove();
                    currentTarget = null;
                    spawnTarget();
                }
            });
            reactionArena.appendChild(target);
            currentTarget = target;
            targetActive = true;
        }
        
        function clearTarget() {
            if(currentTarget) { currentTarget.remove(); currentTarget = null; }
            targetActive = false;
        }
        
        function startLoop() {
            if(reactionInterval) clearInterval(reactionInterval);
            clearTarget();
            spawnTarget();
            reactionInterval = setInterval(() => {
                if(reactionArena && currentTarget) {
                    clearTarget();
                    spawnTarget();
                } else if(reactionArena && !currentTarget) {
                    spawnTarget();
                }
            }, 950);
            gameIntervals.push(reactionInterval);
        }
        
        const resetBtn = container.querySelector('#resetReaction');
        resetBtn.addEventListener('click', () => {
            reactionScore = 0;
            updateScoreUI();
            clearTarget();
            if(reactionInterval) clearInterval(reactionInterval);
            startLoop();
        });
        startLoop();
        return container;
    }

    // ---------- MEMORY PATTERN GAME ----------
    let memoryScore = 0;
    let patternSequence = [];
    let playerTurn = false;
    let currentStep = 0;
    let memoryButtons = [];
    let memoryActive = false;
    
    function buildMemoryGame() {
        const colors = ['#E35F5F', '#5F9E6E', '#5F8BE3', '#E3B15F'];
        const container = document.createElement('div');
        container.className = 'game-area';
        container.innerHTML = `
            <div class="score-info">
                <div>Pattern Score: <span id="memScore">0</span></div>
                <div id="memStatus" class="mem-message">watch sequence</div>
            </div>
            <div class="pattern-grid" id="patternGrid"></div>
            <button id="resetMemory" class="game-btn">new pattern game</button>
        `;
        const grid = container.querySelector('#patternGrid');
        const scoreSpan = container.querySelector('#memScore');
        const statusSpan = container.querySelector('#memStatus');
        let buttons = [];
        
        for(let i=0;i<4;i++) {
            const btn = document.createElement('div');
            btn.className = 'pattern-btn';
            btn.style.backgroundColor = colors[i];
            btn.dataset.index = i;
            btn.addEventListener('click', () => {
                if(!playerTurn || !memoryActive) return;
                const idx = parseInt(btn.dataset.index);
                if(idx === patternSequence[currentStep]) {
                    btn.classList.add('pattern-active');
                    setTimeout(() => btn.classList.remove('pattern-active'), 200);
                    currentStep++;
                    if(currentStep === patternSequence.length) {
                        memoryScore++;
                        scoreSpan.innerText = memoryScore;
                        playerTurn = false;
                        statusSpan.innerText = 'correct! next round...';
                        setTimeout(() => playSequence(), 800);
                    }
                } else {
                    statusSpan.innerText = 'game over! press reset';
                    playerTurn = false;
                    memoryActive = false;
                }
            });
            grid.appendChild(btn);
            buttons.push(btn);
        }
        memoryButtons = buttons;
        
        async function playSequence() {
            memoryActive = false;
            playerTurn = false;
            statusSpan.innerText = 'watch...';
            const newColor = Math.floor(Math.random() * 4);
            patternSequence.push(newColor);
            for(let i=0;i<patternSequence.length;i++) {
                const idx = patternSequence[i];
                const btn = buttons[idx];
                btn.classList.add('pattern-active');
                await new Promise(r => setTimeout(r, 400));
                btn.classList.remove('pattern-active');
                await new Promise(r => setTimeout(r, 180));
            }
            playerTurn = true;
            memoryActive = true;
            currentStep = 0;
            statusSpan.innerText = 'your turn! repeat pattern';
        }
        
        function resetGame() {
            patternSequence = [];
            memoryScore = 0;
            scoreSpan.innerText = '0';
            playerTurn = false;
            memoryActive = false;
            playSequence();
        }
        container.querySelector('#resetMemory').addEventListener('click', resetGame);
        resetGame();
        return container;
    }
    
    // ---------- TIMING SKILL GAME (stop meter) ----------
    let timingScore = 0;
    let meterFill = 0;
    let meterInterval = null;
    let meterDirection = 1;
    function buildTimingGame() {
        const container = document.createElement('div');
        container.className = 'game-area';
        container.innerHTML = `
            <div class="score-info">
                <div>precision points: <span id="timingScore">0</span></div>
                <div>stop in gold zone</div>
            </div>
            <div class="meter-box">
                <div class="meter-bar"><div id="meterFill" class="meter-fill"></div></div>
                <button id="stopMeterBtn" class="stop-btn">stop meter</button>
                <button id="resetTiming" class="game-btn" style="background:#2f2a3a;">new round</button>
            </div>
        `;
        const fillDiv = container.querySelector('#meterFill');
        const scoreSpan = container.querySelector('#timingScore');
        const stopBtn = container.querySelector('#stopMeterBtn');
        const resetBtn = container.querySelector('#resetTiming');
        
        function startMeter() {
            if(meterInterval) clearInterval(meterInterval);
            meterFill = 0;
            fillDiv.style.width = '0%';
            meterDirection = 1;
            meterInterval = setInterval(() => {
                meterFill += meterDirection * 1.8;
                if(meterFill >= 100) { meterFill = 100; meterDirection = -1; }
                if(meterFill <= 0) { meterFill = 0; meterDirection = 1; }
                fillDiv.style.width = meterFill + '%';
            }, 35);
            gameIntervals.push(meterInterval);
        }
        
        function stopMeter() {
            if(meterInterval) clearInterval(meterInterval);
            let points = 0;
            if(meterFill >= 48 && meterFill <= 52) points = 10;
            else if(meterFill >= 44 && meterFill <= 56) points = 5;
            else if(meterFill >= 38 && meterFill <= 62) points = 2;
            else points = 0;
            if(points > 0) {
                timingScore += points;
                scoreSpan.innerText = timingScore;
                alert(`zone: ${Math.floor(meterFill)}%  +${points} pts`);
            } else {
                alert(`miss! ${Math.floor(meterFill)}% , 0 points`);
            }
            startMeter();
        }
        
        resetBtn.addEventListener('click', () => {
            timingScore = 0;
            scoreSpan.innerText = '0';
            if(meterInterval) clearInterval(meterInterval);
            startMeter();
        });
        stopBtn.addEventListener('click', stopMeter);
        startMeter();
        return container;
    }
    
    // ---------- PUZZLE: TILE SWAP (3x3) ----------
    let tiles = [];
    let emptyIndex = 8;
    function buildPuzzleGame() {
        const container = document.createElement('div');
        container.className = 'game-area';
        container.innerHTML = `
            <div class="score-info"><div>slide puzzle</div><div id="puzzleMsg">swap with empty tile</div></div>
            <div id="puzzleGrid" class="puzzle-grid"></div>
            <button id="shufflePuzzle" class="game-btn">shuffle puzzle</button>
        `;
        const gridDiv = container.querySelector('#puzzleGrid');
        const msgSpan = container.querySelector('#puzzleMsg');
        
        function initTiles() {
            tiles = [1,2,3,4,5,6,7,8, null];
            emptyIndex = 8;
        }
        function render() {
            gridDiv.innerHTML = '';
            for(let i=0;i<9;i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                if(tiles[i] === null) {
                    tile.classList.add('empty-tile');
                    tile.innerText = '';
                } else {
                    tile.innerText = tiles[i];
                }
                tile.addEventListener('click', (function(idx){ return function(){ trySwap(idx); }; })(i));
                gridDiv.appendChild(tile);
            }
        }
        function trySwap(clickedIdx) {
            const validMoves = [emptyIndex-3, emptyIndex+3, emptyIndex-1, emptyIndex+1];
            if(validMoves.includes(clickedIdx) && 
               !(emptyIndex%3===2 && clickedIdx%3===0) && 
               !(emptyIndex%3===0 && clickedIdx%3===2)) {
                [tiles[emptyIndex], tiles[clickedIdx]] = [tiles[clickedIdx], tiles[emptyIndex]];
                emptyIndex = clickedIdx;
                render();
                checkWin();
            }
        }
        function checkWin() {
            let win = true;
            for(let i=0;i<8;i++) if(tiles[i] !== i+1) win = false;
            if(win && tiles[8] === null) msgSpan.innerText = 'victory! puzzle solved!';
            else msgSpan.innerText = 'keep swapping';
        }
        function shuffle() {
            for(let step=0;step<200;step++) {
                const neighbors = [];
                if(emptyIndex-3>=0) neighbors.push(emptyIndex-3);
                if(emptyIndex+3<9) neighbors.push(emptyIndex+3);
                if(emptyIndex%3 !== 0) neighbors.push(emptyIndex-1);
                if(emptyIndex%3 !== 2) neighbors.push(emptyIndex+1);
                const rand = neighbors[Math.floor(Math.random()*neighbors.length)];
                [tiles[emptyIndex], tiles[rand]] = [tiles[rand], tiles[emptyIndex]];
                emptyIndex = rand;
            }
            render();
            msgSpan.innerText = 'shuffled! solve it';
        }
        initTiles();
        shuffle();
        container.querySelector('#shufflePuzzle').addEventListener('click', () => { initTiles(); shuffle(); });
        return container;
    }
    
    // ---------- CATCH FALLING OBJECTS ----------
    let catchScore = 0;
    let catchItems = [];
    let catcherX = 50;
    let catchInterval = null;
    let catchAnimation = null;
    function buildCatchGame() {
        const container = document.createElement('div');
        container.className = 'game-area';
        container.innerHTML = `
            <div class="score-info"><div>caught: <span id="catchScoreValue">0</span></div><div>click on falling orbs</div></div>
            <div id="catchArena" class="catch-arena" style="position:relative;">
                <div id="catcherVisual" class="catcher"></div>
            </div>
            <button id="resetCatch" class="game-btn">reset catch game</button>
        `;
        const arena = container.querySelector('#catchArena');
        const catcherDiv = container.querySelector('#catcherVisual');
        const scoreSpan = container.querySelector('#catchScoreValue');
        catchScore = 0;
        catchItems = [];
        
        function moveCatcher(e) {
            const rect = arena.getBoundingClientRect();
            let clientX = e.clientX;
            if(clientX) {
                let relativeX = clientX - rect.left;
                let newX = Math.min(Math.max(relativeX, 20), rect.width - 20);
                catcherX = (newX / rect.width) * 100;
                catcherDiv.style.left = `calc(${catcherX}% - 50px)`;
            }
        }
        arena.addEventListener('mousemove', moveCatcher);
        arena.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            if(touch) {
                const rect = arena.getBoundingClientRect();
                let relX = touch.clientX - rect.left;
                let newX = Math.min(Math.max(relX, 20), rect.width - 20);
                catcherX = (newX / rect.width) * 100;
                catcherDiv.style.left = `calc(${catcherX}% - 50px)`;
            }
        });
        
        function createFallingItem() {
            const arenaRect = arena.getBoundingClientRect();
            if(arenaRect.width === 0) return;
            const item = document.createElement('div');
            item.className = 'fall-item';
            const randX = Math.random() * (arenaRect.width - 50);
            item.style.left = randX + 'px';
            item.style.top = '0px';
            item.style.position = 'absolute';
            let yPos = 0;
            item.dataset.y = 0;
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                if(item.parentNode) {
                    catchScore++;
                    scoreSpan.innerText = catchScore;
                    item.remove();
                    const index = catchItems.indexOf(item);
                    if(index !== -1) catchItems.splice(index,1);
                }
            });
            arena.appendChild(item);
            catchItems.push(item);
            function fall() {
                if(!item.parentNode) return;
                let currentY = parseFloat(item.style.top) || 0;
                currentY += 5;
                item.style.top = currentY + 'px';
                if(currentY > arenaRect.height - 60) {
                    if(item.parentNode) item.remove();
                    const idx = catchItems.indexOf(item);
                    if(idx !== -1) catchItems.splice(idx,1);
                } else {
                    requestAnimationFrame(fall);
                }
            }
            requestAnimationFrame(fall);
        }
        
        function startSpawner() {
            if(catchInterval) clearInterval(catchInterval);
            catchInterval = setInterval(() => {
                if(arena) createFallingItem();
            }, 700);
            gameIntervals.push(catchInterval);
        }
        function resetGame() {
            catchItems.forEach(i => i.remove());
            catchItems = [];
            catchScore = 0;
            scoreSpan.innerText = '0';
        }
        container.querySelector('#resetCatch').addEventListener('click', resetGame);
        startSpawner();
        return container;
    }
    
    // ---------- SWITCH GAMES ----------
    function renderGame(gameId) {
        clearGameIntervals();
        cancelAnimation();
        const panel = document.getElementById('gamePanel');
        let gameContent = null;
        if(gameId === 'reaction') gameContent = buildReactionGame();
        else if(gameId === 'memory') gameContent = buildMemoryGame();
        else if(gameId === 'timing') gameContent = buildTimingGame();
        else if(gameId === 'puzzle') gameContent = buildPuzzleGame();
        else if(gameId === 'catch') gameContent = buildCatchGame();
        if(gameContent) {
            panel.innerHTML = '';
            panel.appendChild(gameContent);
        }
        // update active button style
        document.querySelectorAll('.game-btn').forEach(btn => {
            if(btn.dataset.game === gameId) btn.classList.add('active-game');
            else btn.classList.remove('active-game');
        });
    }
    
    // menu listeners
    document.querySelectorAll('.game-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const game = btn.dataset.game;
            if(game) {
                currentGame = game;
                renderGame(currentGame);
            }
        });
    });
    renderGame('reaction');
</script>
</body>
</html>
